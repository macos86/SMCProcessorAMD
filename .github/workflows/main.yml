name: CI

on:
  push:
  pull_request:
  workflow_dispatch:
  release:
    types: [published]

env:
  PROJECT_TYPE: KEXT

jobs:
  build:
    name: Build
    # Pinned to macos-15: as of June 2026 "macos-latest" points to macOS 26,
    # which only ships Xcode 26.x. acidanthera/ocbuild's ci-bootstrap.sh hardcodes
    # Xcode 16.4.0, which is still preinstalled on macos-15 but no longer exists
    # on macos-26 (hence "missing DEVELOPER_DIR path: /Applications/Xcode_16.4.0.app").
    runs-on: macos-15
    env:
      JOB_TYPE: BUILD
    steps:
      - uses: actions/checkout@v4
      - uses: actions/checkout@v4
        with:
          repository: acidanthera/MacKernelSDK
          path: MacKernelSDK
      - name: CI Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/acidanthera/ocbuild/master/ci-bootstrap.sh) && eval "$src" || exit 1
      - name: Lilu & VirtualSMC Bootstrap
        run: |
          src=$(/usr/bin/curl -Lfs https://raw.githubusercontent.com/Lorys89/Lorys89/main/Scripts/bootstrap.sh) && eval "$src" || exit 1
      - run: xcodebuild -jobs 1 -configuration Debug -arch x86_64
      - run: xcodebuild -jobs 1 -configuration Release -arch x86_64

      - name: Upload to Artifacts
        uses: actions/upload-artifact@v4
        with:
          name: Artifacts
          path: build/*/*.zip
      - name: Upload to Release
        if: github.event_name == 'release'
        uses: svenstaro/upload-release-action@e74ff71f7d8a4c4745b560a485cc5fdb9b5b999d
        with:
          repo_token: ${{ secrets.GITHUB_TOKEN }}
          file: build/*/*.zip
          tag: ${{ github.ref }}
          file_glob: true  
    
